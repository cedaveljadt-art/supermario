<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: black;
            color: white;
            text-align: center;
            flex-direction: column;
            margin:0;
            overflow: hidden;
        }
        #fullscreenbutton,#devmodebutton{
            display: none;
            height: 50px;
            width:300px;
            align-items: center;
            justify-content: center;
            color:white;
            background-color: gray;
            border-radius: 5px;
            border:1px white;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h1>Mario run</h1>
    <canvas id="canvas"></canvas>
    <h5 id="fullscreen">Press 1 for fullscreen</h5>
    <button id="fullscreenbutton" onclick="fullscreen()">Click for fullscreen</button>
    <h5 id="devmode">Press 2 for dev mode</h5>
    <button id="devmodebutton" onclick="devmode()">Click for dev mode</button>
</body>
    <script>
        canvas = document.getElementById("canvas");
        window.onload = () => {
            canvas.focus()
        }
    </script>
    <script src="https://unpkg.com/kaboom@2000.2.10/dist/kaboom.js"></script>
    <script src="script.js"></script>
</html>
